services:
  rhess:
    image: quay.io/redhat-ai-dev/rhess:latest
    ports:
      - "3000:3000"
    environment:
      RHESS_ADMIN_TOKEN: ${RHESS_ADMIN_TOKEN:?Set RHESS_ADMIN_TOKEN in .env (run: openssl rand -hex 32)}
      DATABASE_PATH: /data/rhess.db
    volumes:
      - rhess-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rhess-data:
